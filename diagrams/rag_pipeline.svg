<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="1000" height="720" fill="#ffffff"/>
  <text x="500" y="34" font-size="22" font-weight="bold" text-anchor="middle" fill="#1a1a1a">RAG Pipeline: Upload to Answer</text>

  <!-- INGESTION LANE -->
  <text x="30" y="70" font-size="14" font-weight="bold" fill="#34a853">INGESTION (happens once per document)</text>

  <g>
    <rect x="30" y="85" width="160" height="60" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
    <text x="110" y="110" text-anchor="middle" font-size="12">1. Upload file</text>
    <text x="110" y="127" text-anchor="middle" font-size="10" fill="#555">PDF / DOCX / TXT / MD / HTML</text>
  </g>

  <line x1="190" y1="115" x2="228" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g>
    <rect x="230" y="85" width="160" height="60" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
    <text x="310" y="110" text-anchor="middle" font-size="12">2. Extract text</text>
    <text x="310" y="127" text-anchor="middle" font-size="10" fill="#555">document_loader.py</text>
  </g>

  <line x1="390" y1="115" x2="428" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g>
    <rect x="430" y="85" width="160" height="60" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
    <text x="510" y="105" text-anchor="middle" font-size="12">3. Split into chunks</text>
    <text x="510" y="122" text-anchor="middle" font-size="10" fill="#555">text_splitter.py</text>
    <text x="510" y="136" text-anchor="middle" font-size="9" fill="#777">1000 chars, 150 overlap</text>
  </g>

  <line x1="590" y1="115" x2="628" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g>
    <rect x="630" y="85" width="160" height="60" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
    <text x="710" y="105" text-anchor="middle" font-size="12">4. Generate embeddings</text>
    <text x="710" y="122" text-anchor="middle" font-size="10" fill="#555">Gemini embedding-001</text>
    <text x="710" y="136" text-anchor="middle" font-size="9" fill="#777">text -> 768-dim vector</text>
  </g>

  <line x1="790" y1="115" x2="828" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g>
    <rect x="830" y="85" width="140" height="60" rx="8" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
    <text x="900" y="110" text-anchor="middle" font-size="12">5. Store in</text>
    <text x="900" y="127" text-anchor="middle" font-size="12">ChromaDB</text>
  </g>

  <!-- Divider -->
  <line x1="30" y1="180" x2="970" y2="180" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- QUERY LANE -->
  <text x="30" y="215" font-size="14" font-weight="bold" fill="#ea4335">QUERY (happens every time the user asks a question)</text>

  <g>
    <rect x="30" y="230" width="160" height="60" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
    <text x="110" y="255" text-anchor="middle" font-size="12">6. User asks</text>
    <text x="110" y="272" text-anchor="middle" font-size="12">a question</text>
  </g>

  <line x1="190" y1="260" x2="228" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g>
    <rect x="230" y="230" width="180" height="60" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
    <text x="320" y="252" text-anchor="middle" font-size="12">7. Embed the question</text>
    <text x="320" y="269" text-anchor="middle" font-size="10" fill="#555">same embedding model</text>
  </g>

  <line x1="410" y1="260" x2="448" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g>
    <rect x="450" y="230" width="200" height="60" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
    <text x="550" y="252" text-anchor="middle" font-size="12">8. Similarity search</text>
    <text x="550" y="269" text-anchor="middle" font-size="10" fill="#555">top-K nearest chunks</text>
  </g>

  <line x1="650" y1="260" x2="688" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g>
    <rect x="690" y="230" width="140" height="60" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
    <text x="760" y="252" text-anchor="middle" font-size="12">9. Build prompt</text>
    <text x="760" y="269" text-anchor="middle" font-size="10" fill="#555">context + history</text>
  </g>

  <line x1="830" y1="260" x2="868" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <g>
    <rect x="870" y="230" width="100" height="60" rx="8" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
    <text x="920" y="255" text-anchor="middle" font-size="12">10. Gemini</text>
    <text x="920" y="272" text-anchor="middle" font-size="12">LLM</text>
  </g>

  <!-- Down to ChromaDB link (step 8 pulls from stored vectors) -->
  <line x1="900" y1="145" x2="900" y2="200" stroke="#999" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="900" y1="200" x2="550" y2="200" stroke="#999" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="550" y1="200" x2="550" y2="228" stroke="#999" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <text x="700" y="196" font-size="10" fill="#888">retrieves from stored vectors</text>

  <!-- Final answer -->
  <line x1="920" y1="290" x2="920" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="920" y1="340" x2="180" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="180" y1="340" x2="180" y2="368" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="30" y="370" width="940" height="90" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="500" y="400" text-anchor="middle" font-size="14" font-weight="bold">11. Answer displayed with source citations</text>
  <text x="500" y="422" text-anchor="middle" font-size="12" fill="#444">Every chunk used in the prompt keeps its metadata (filename, page number),</text>
  <text x="500" y="440" text-anchor="middle" font-size="12" fill="#444">so the UI shows exactly which document(s) the answer came from.</text>

  <!-- Legend -->
  <rect x="30" y="490" width="18" height="18" fill="#e6f4ea" stroke="#34a853"/>
  <text x="55" y="504" font-size="12" fill="#333">Ingestion stage (runs once per uploaded document)</text>
  <rect x="30" y="516" width="18" height="18" fill="#fce8e6" stroke="#ea4335"/>
  <text x="55" y="530" font-size="12" fill="#333">Query stage (runs once per user question)</text>
  <rect x="30" y="542" width="18" height="18" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="55" y="556" font-size="12" fill="#333">Final output shown to the user</text>
</svg>
