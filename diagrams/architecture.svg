<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#444"/>
    </marker>
  </defs>
  <rect width="1000" height="560" fill="#ffffff"/>
  <text x="500" y="35" font-size="22" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Enterprise AI Knowledge Hub — System Architecture</text>

  <!-- User -->
  <rect x="40" y="230" width="140" height="70" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="110" y="270" text-anchor="middle" font-size="14" fill="#1a1a1a">User (Browser)</text>

  <!-- Streamlit UI -->
  <rect x="240" y="230" width="160" height="70" rx="10" fill="#fef7e0" stroke="#f9ab00" stroke-width="2"/>
  <text x="320" y="260" text-anchor="middle" font-size="14" fill="#1a1a1a">Streamlit UI</text>
  <text x="320" y="278" text-anchor="middle" font-size="11" fill="#555">app.py</text>

  <!-- Ingestion pipeline -->
  <rect x="460" y="60" width="500" height="150" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <text x="710" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Ingestion Pipeline</text>

  <rect x="480" y="100" width="100" height="50" rx="6" fill="#ffffff" stroke="#34a853"/>
  <text x="530" y="130" text-anchor="middle" font-size="11">document_loader.py</text>

  <rect x="600" y="100" width="100" height="50" rx="6" fill="#ffffff" stroke="#34a853"/>
  <text x="650" y="130" text-anchor="middle" font-size="11">text_splitter.py</text>

  <rect x="720" y="100" width="100" height="50" rx="6" fill="#ffffff" stroke="#34a853"/>
  <text x="770" y="123" text-anchor="middle" font-size="11">vector_store.py</text>
  <text x="770" y="138" text-anchor="middle" font-size="10" fill="#555">(embed)</text>

  <rect x="840" y="100" width="100" height="50" rx="6" fill="#ffffff" stroke="#34a853"/>
  <text x="890" y="123" text-anchor="middle" font-size="11">ChromaDB</text>
  <text x="890" y="138" text-anchor="middle" font-size="10" fill="#555">(persisted)</text>

  <line x1="580" y1="125" x2="598" y2="125" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="125" x2="718" y2="125" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="820" y1="125" x2="838" y2="125" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Retrieval + Generation pipeline -->
  <rect x="460" y="260" width="500" height="150" rx="10" fill="#fce8e6" stroke="#ea4335" stroke-width="2"/>
  <text x="710" y="282" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a1a">Retrieval + Generation Pipeline</text>

  <rect x="480" y="300" width="120" height="50" rx="6" fill="#ffffff" stroke="#ea4335"/>
  <text x="540" y="323" text-anchor="middle" font-size="11">vector_store.py</text>
  <text x="540" y="338" text-anchor="middle" font-size="10" fill="#555">(similarity search)</text>

  <rect x="620" y="300" width="100" height="50" rx="6" fill="#ffffff" stroke="#ea4335"/>
  <text x="670" y="330" text-anchor="middle" font-size="11">qa_chain.py</text>

  <rect x="740" y="300" width="100" height="50" rx="6" fill="#ffffff" stroke="#ea4335"/>
  <text x="790" y="330" text-anchor="middle" font-size="11">Gemini LLM</text>

  <rect x="860" y="300" width="80" height="50" rx="6" fill="#ffffff" stroke="#ea4335"/>
  <text x="900" y="330" text-anchor="middle" font-size="11">Answer +</text>
  <text x="900" y="343" text-anchor="middle" font-size="11">Citations</text>

  <line x1="600" y1="325" x2="618" y2="325" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="325" x2="738" y2="325" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="840" y1="325" x2="858" y2="325" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Connections User <-> UI -->
  <line x1="180" y1="265" x2="238" y2="265" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="238" y1="280" x2="180" y2="280" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- UI -> Ingestion (upload) -->
  <line x1="400" y1="240" x2="458" y2="140" stroke="#34a853" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="200" font-size="10" fill="#34a853">upload doc</text>

  <!-- UI -> Retrieval (question) -->
  <line x1="400" y1="290" x2="458" y2="330" stroke="#ea4335" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="320" font-size="10" fill="#ea4335">ask question</text>

  <!-- Answer back to UI -->
  <line x1="900" y1="350" x2="900" y2="440" stroke="#444" stroke-width="1.5"/>
  <line x1="900" y1="440" x2="320" y2="440" stroke="#444" stroke-width="1.5"/>
  <line x1="320" y1="440" x2="320" y2="302" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="600" y="455" text-anchor="middle" font-size="11" fill="#444">answer + source citations rendered in chat</text>

  <!-- Storage note -->
  <rect x="40" y="460" width="900" height="70" rx="10" fill="#f3f3f3" stroke="#999" stroke-width="1"/>
  <text x="60" y="485" font-size="12" fill="#333">config.py centralizes all settings (chunk size, model names, file paths) used by every module above.</text>
  <text x="60" y="508" font-size="12" fill="#333">data/chroma_db/ persists vector embeddings to disk so the knowledge base survives app restarts.</text>
</svg>
